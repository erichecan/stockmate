# StockFlow GCP Cloud Build - 部署 Backend + Frontend 到 Cloud Run
# Updated: 2026-02-26T16:12:00 - 修复本地 submit 时 SHORT_SHA 为空导致 tag 无效
# 原因：gcloud builds submit 不触发时 SHORT_SHA 为空，tag 变成 "stockmate-api:" 无效
# 解决：使用 BUILD_ID（每次构建都有）
#
# 使用方法:
#   gcloud builds submit --config=cloudbuild.yaml --project=stockmate-488805
#
# 环境变量 (Secret Manager 或 Cloud Run 控制台配置):
#   Backend: DATABASE_URL, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, CORS_ORIGIN
#   Frontend: NEXT_PUBLIC_API_URL (构建时传入，指向 Backend URL)

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: stockmate-api
  _FRONTEND_SERVICE: stockmate-web

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 0. 确保 Artifact Registry 仓库存在 (可选，首次部署时可能需要)
  # 若报错，请先运行: gcloud artifacts repositories create cloud-run-source-deploy --repository-format=docker --location=us-central1

  # 1. 构建 Backend 镜像
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: ensure-repo
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe cloud-run-source-deploy --location=${_REGION} 2>/dev/null || \
        gcloud artifacts repositories create cloud-run-source-deploy --repository-format=docker --location=${_REGION}

  # 1. 构建 Backend 镜像
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    waitFor: ['ensure-repo']
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_BACKEND_SERVICE}:${BUILD_ID}
      - -f
      - backend/Dockerfile
      - .
    dir: .

  # 2. 推送 Backend 镜像
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_BACKEND_SERVICE}:${BUILD_ID}
    waitFor: ['build-backend']

  # 3. 部署 Backend 到 Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: bash
    args:
      - -c
      - |
        # Updated: 2026-02-26T16:15:00 - 支持从 substitutions 注入 env（用 env 文件避免 URL 特殊字符）
        EXTRA=""
        if [ -n "${_ENV_DATABASE_URL}" ]; then
          printf 'DATABASE_URL: "%s"\nJWT_ACCESS_SECRET: "%s"\nJWT_REFRESH_SECRET: "%s"\nCORS_ORIGIN: "%s"\n' \
            "${_ENV_DATABASE_URL}" "${_ENV_JWT_ACCESS}" "${_ENV_JWT_REFRESH}" "${_ENV_CORS}" > /tmp/env.yaml
          EXTRA="--env-vars-file=/tmp/env.yaml"
        fi
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_BACKEND_SERVICE}:${BUILD_ID} \
          --region=${_REGION} --platform=managed --allow-unauthenticated --port=3001 \
          $$EXTRA
    waitFor: ['push-backend']

  # 3b. 确保 Backend 允许匿名访问（--allow-unauthenticated 需配合 IAM）
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: iam-backend
    entrypoint: gcloud
    args:
      - run
      - services
      - add-iam-policy-binding
      - ${_BACKEND_SERVICE}
      - --region=${_REGION}
      - --member=allUsers
      - --role=roles/run.invoker
    waitFor: ['deploy-backend']

  # 4. 获取 Backend URL (用于 Frontend 构建)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-backend-url
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)' > backend_url.txt
        cat backend_url.txt
    waitFor: ['deploy-backend']

  # 5. 构建 Frontend 镜像 (注入 Backend API URL)
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    entrypoint: bash
    args:
      - -c
      - |
        API_URL=$$(cat backend_url.txt)/api
        docker build --build-arg NEXT_PUBLIC_API_URL=$$API_URL -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_FRONTEND_SERVICE}:${BUILD_ID} -f frontend/Dockerfile .
    dir: .
    waitFor: ['get-backend-url']

  # 6. 推送 Frontend 镜像
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_FRONTEND_SERVICE}:${BUILD_ID}
    waitFor: ['build-frontend']

  # 7. 部署 Frontend 到 Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_FRONTEND_SERVICE}:${BUILD_ID}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"
    waitFor: ['push-frontend']

  # 7b. 确保 Frontend 允许匿名访问
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: iam-frontend
    entrypoint: gcloud
    args:
      - run
      - services
      - add-iam-policy-binding
      - ${_FRONTEND_SERVICE}
      - --region=${_REGION}
      - --member=allUsers
      - --role=roles/run.invoker
    waitFor: ['deploy-frontend']
